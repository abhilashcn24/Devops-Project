<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Edit your note — Smart Notes Launchpad">
<title>Edit Note · Launchpad</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00d4ff;
    --accent-glow: #00d4ff25;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --muted: #4a5568;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 40%, #7c3aed08 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, #00d4ff08 0%, transparent 50%);
    z-index: 0;
    pointer-events: none;
  }

  header {
    position: relative;
    z-index: 1;
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10, 10, 15, 0.8);
    backdrop-filter: blur(20px);
  }
  .logo {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--muted); }
  .back-link {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-link:hover { color: var(--accent); }

  main {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 64px 24px;
    animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::before { content: '//'; color: var(--accent2); }

  .form-card {
    background: rgba(17, 17, 24, 0.7);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    backdrop-filter: blur(10px);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .form-card:focus-within {
    border-color: #7c3aed30;
    box-shadow: 0 0 30px #7c3aed08;
  }

  .field { margin-bottom: 20px; }
  label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 8px;
  }
  input[type="text"], textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px #7c3aed20;
  }
  textarea { height: 180px; line-height: 1.6; }

  .actions {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }
  .btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent2), #6d28d9);
    color: #fff;
    box-shadow: 0 2px 12px #7c3aed20;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px #7c3aed35;
  }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .char-info {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    margin-top: 8px;
  }

  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    main { padding: 32px 16px; }
    .form-card { padding: 24px; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">The <span>//</span> Launchpad <span>·</span> Edit Note</div>
  <a href="/" class="back-link">← Back to Notes</a>
</header>
<main>
  <div class="section-label">editing note</div>
  <div class="form-card">
    <form action="/edit/{{ note.id }}" method="POST">
      <div class="field">
        <label for="editTitle">Title</label>
        <input type="text" name="title" id="editTitle" value="{{ note.title }}" required maxlength="80">
      </div>
      <div class="field">
        <label for="editContent">Content</label>
        <textarea name="content" id="editContent" required maxlength="500">{{ note.content }}</textarea>
        <div class="char-info" id="editCharCount">0 / 500</div>
      </div>
      <div class="actions">
        <button type="submit" class="btn btn-primary">✓ Save Changes</button>
        <a href="/" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</main>

<script>
  const textarea = document.getElementById('editContent');
  const counter = document.getElementById('editCharCount');
  function updateCount() {
    const len = textarea.value.length;
    counter.textContent = len + ' / 500';
    counter.style.color = len > 450 ? '#ff4757' : len > 350 ? '#ffa502' : '#4a5568';
  }
  textarea.addEventListener('input', updateCount);
  updateCount();
</script>
</body>
</html>
